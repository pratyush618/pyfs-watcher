[project]
site_name = "pyfs-watcher"
site_url = "https://pratyush618.github.io/pyfs-watcher/"
site_description = "Rust-powered filesystem toolkit for Python"
site_author = "Pratyush Sharma"
repo_url = "https://github.com/pratyush618/pyfs-watcher"
repo_name = "pratyush618/pyfs-watcher"
copyright = "Copyright &copy; 2026 Pratyush Sharma"
extra_css = ["assets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Guides" = [
    "guides/walk.md",
    "guides/hash.md",
    "guides/copy-move.md",
    "guides/watch.md",
    "guides/dedup.md",
    "guides/search.md",
    "guides/diff.md",
    "guides/sync.md",
    "guides/snapshot.md",
    "guides/disk-usage.md",
    "guides/rename.md",
  ] },
  { "API Reference" = [
    "api/index.md",
    "api/exceptions.md",
    "api/walk.md",
    "api/hash.md",
    "api/copy.md",
    "api/watch.md",
    "api/dedup.md",
    "api/search.md",
    "api/diff.md",
    "api/sync.md",
    "api/snapshot.md",
    "api/disk-usage.md",
    "api/rename.md",
  ] },
  { "Architecture" = "architecture.md" },
  { "Contributing" = "contributing.md" },
  { "Changelog" = "changelog.md" },
]

[project.theme]
variant = "modern"
logo = "assets/logo.svg"
favicon = "assets/favicon/favicon.ico"
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-4", name = "Switch to light mode" }

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.extra.social]
icon = "fontawesome/brands/github"
link = "https://github.com/pratyush618/pyfs-watcher"

# Markdown extensions
[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.def_list]

[project.markdown_extensions.tables]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.snippets]

[project.extra]
generator = false
